spring.application.name=demo2

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/food?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&tinyInt1isBit=false

spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson 日期序列化（修复 LocalDateTime 无法序列化导致前端报错）
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

# JWT 密钥（生产环境请使用更复杂的密钥并通过环境变量注入）
jwt.secret=ThisIsASecretKeyForJWTTokenGenerationMustBe256BitsLong!!

# 文件上传配置
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# 图片上传目录（相对于项目根目录）
file.upload.dir=uploads
# 允许的图片类型
file.upload.allowed-types=image/jpeg,image/png,image/gif,image/webp,bmp,vnd.microsoft.icon
